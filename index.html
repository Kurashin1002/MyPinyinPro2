<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyPinyin Pro v17</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        .h-s { display: none; }
        .tab-btn { color: #1e293b; font-weight: 900; font-size: 1.1rem; transition: all 0.2s; }
        .tab-active { color: #ffffff !important; background-color: #ef4444; border-radius: 0.75rem; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }
        input, textarea { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 text-slate-900 pb-20">

    <div class="max-w-md mx-auto mb-4 px-2 flex justify-between items-end">
        <h1 class="text-3xl font-black italic tracking-tighter text-slate-800">MyPinyin</h1>
        <span class="text-[10px] font-bold text-slate-400 pb-1">v17.0 - Text Export Mode</span>
    </div>

    <nav class="flex justify-around mb-6 bg-white p-2 rounded-2xl shadow-md max-w-md mx-auto border border-slate-200 sticky top-2 z-50">
        <button onclick="sw('add')" id="btn-add" class="tab-btn flex-1 py-3 tab-active">登録</button>
        <button onclick="sw('list')" id="btn-list" class="tab-btn flex-1 py-3">一覧</button>
        <button onclick="sw('quiz')" id="btn-quiz" class="tab-btn flex-1 py-3">クイズ</button>
    </nav>

    <div class="max-w-md mx-auto">
        <section id="s-add" class="space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl space-y-5 border-2 border-transparent">
                <div id="edit-banner" class="hidden text-center py-2 bg-amber-500 text-white text-xs font-black rounded-xl">編集モード</div>
                <div class="space-y-1">
                    <label class="text-xs font-black text-slate-600 ml-1">ピンイン (例: han4zi4)</label>
                    <div class="flex gap-2">
                        <input id="pIn" placeholder="han4zi4" class="flex-1 p-4 bg-slate-50 rounded-2xl text-lg font-mono font-bold outline-none border-2 border-slate-100 focus:border-indigo-500 transition-all">
                        <button onclick="autoFillAll()" class="bg-indigo-600 text-white px-6 rounded-2xl font-black shadow-lg active:scale-95">変換</button>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-black text-slate-600 ml-1">単語</label>
                    <div class="flex gap-2">
                        <input id="wIn" placeholder="漢字" class="flex-1 p-4 bg-slate-50 rounded-2xl text-2xl font-black outline-none border-2 border-slate-100 focus:border-red-500">
                        <button onclick="speak(document.getElementById('wIn').value)" class="bg-slate-200 text-slate-700 px-4 rounded-2xl text-2xl active:bg-slate-300">🔊</button>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-black text-slate-600 ml-1">意味</label>
                    <input id="mIn" placeholder="日本語" class="w-full p-4 bg-slate-50 rounded-2xl text-lg font-bold outline-none border-2 border-slate-100 focus:border-red-500">
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div class="col-span-1 space-y-1">
                        <label class="text-xs font-black text-slate-600 ml-1">ページ</label>
                        <input id="pgIn" type="number" placeholder="P." class="w-full p-4 bg-slate-50 rounded-2xl text-lg font-bold outline-none border-2 border-slate-100 focus:border-indigo-500">
                    </div>
                    <div class="col-span-2 space-y-1">
                        <label class="text-xs font-black text-slate-600 ml-1">詳細・例文</label>
                        <textarea id="dIn" placeholder="メモなど" class="w-full p-4 bg-slate-50 rounded-2xl text-sm h-[60px] resize-none outline-none border-2 border-slate-100 focus:border-slate-400"></textarea>
                    </div>
                </div>
                <div class="flex gap-3 pt-2">
                    <button id="cancel-btn" onclick="resetForm()" class="hidden flex-1 bg-slate-200 text-slate-800 p-5 rounded-2xl font-black active:scale-95">中止</button>
                    <button id="save-btn" onclick="add()" class="flex-[2] bg-red-600 text-white p-5 rounded-2xl font-black shadow-lg text-xl active:scale-95">登録する</button>
                </div>
            </div>
        </section>

        <section id="s-list" class="h-s space-y-4">
            <div id="word-list-container" class="space-y-4"></div>
            
            <div class="mt-12 p-6 bg-slate-800 rounded-[2rem] text-white space-y-4 shadow-2xl">
                <div class="flex justify-between items-center">
                    <h3 class="font-black text-lg text-emerald-400">データの書き出し・追加</h3>
                    <span id="data-count-badge" class="bg-slate-700 text-[10px] px-2 py-1 rounded-full font-mono">0 words</span>
                </div>
                <textarea id="shareData" placeholder="コピーしたデータをここに貼り付けて「追加」" class="w-full h-24 bg-slate-700 rounded-xl p-3 text-[10px] font-mono outline-none border border-slate-600 focus:border-emerald-400"></textarea>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="exportData()" class="bg-indigo-500 hover:bg-indigo-600 p-3 rounded-xl font-black text-sm transition-all">現在のデータを表示</button>
                    <button onclick="importData()" class="bg-emerald-500 hover:bg-emerald-600 p-3 rounded-xl font-black text-sm transition-all">データを追加</button>
                </div>
                <button id="clear-all-btn" onclick="confirmClearAll()" class="w-full bg-rose-600 hover:bg-rose-700 p-3 rounded-xl font-black text-sm transition-all mt-2">登録単語全削除</button>
                <p class="text-[9px] text-slate-500 text-center uppercase tracking-widest">Text format: JSON [ {"word":"..."} ]</p>
            </div>
        </section>

        <section id="s-quiz" class="h-s space-y-4">
            <div id="q-config" class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center space-y-6">
                <div>
                    <h2 class="text-2xl font-black text-slate-800">クイズ開始</h2>
                    <div id="unlearned-count" class="text-xs font-bold text-slate-400 mt-1"></div>
                </div>
                <div class="pt-2">
                    <button onclick="document.getElementById('q-page-box').classList.toggle('hidden')" class="text-[10px] font-black text-slate-400 underline">出題範囲を絞る</button>
                    <div id="q-page-box" class="hidden mt-3 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold text-slate-500 whitespace-nowrap">ページ指定:</span>
                            <input id="q-page-filter" type="number" placeholder="すべてのページ" oninput="setupQuizConfig()" class="w-full p-2 text-sm rounded-lg border border-slate-200 font-bold">
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button onclick="startQuiz(15)" class="p-4 bg-slate-100 text-slate-700 rounded-2xl font-black active:bg-slate-200">15問</button>
                    <button onclick="startQuiz(30)" class="p-4 bg-slate-100 text-slate-700 rounded-2xl font-black active:bg-slate-200">30問</button>
                    <button onclick="startQuiz(50)" class="p-4 bg-slate-100 text-slate-700 rounded-2xl font-black active:bg-slate-200">50問</button>
                    <button onclick="startQuiz(Infinity)" class="p-4 bg-slate-800 text-white rounded-2xl font-black shadow-lg">全問挑戦</button>
                </div>
            </div>

            <div id="q-main" class="h-s space-y-6 text-center">
                <div class="flex justify-between items-center px-4">
                    <div id="q-progress" class="text-xs font-black text-slate-400"></div>
                    <button onclick="exitQuiz()" class="text-xs font-black text-slate-400 bg-slate-200 px-3 py-1 rounded-full">中止</button>
                </div>
                <div onclick="speak(this.innerText)" id="q-q" class="text-7xl font-black py-20 bg-white rounded-[4rem] shadow-2xl text-slate-800 active:bg-slate-50">---</div>
                <div id="q-a" class="hidden space-y-4 bg-white p-8 rounded-[3rem] shadow-inner border-2 border-indigo-50">
                    <div class="flex items-center justify-center gap-2">
                        <div id="q-p" class="text-3xl text-indigo-600 font-black font-mono"></div>
                        <button onclick="speak(document.getElementById('q-q').innerText)" class="text-2xl">🔊</button>
                    </div>
                    <div id="q-m" class="text-xl text-slate-700 font-black"></div>
                    <div class="pt-4 border-t border-slate-100">
                        <label class="flex items-center justify-center gap-2 cursor-pointer">
                            <input type="checkbox" id="q-learned-toggle" onchange="updateLearnedInQuiz()" class="w-6 h-6 accent-green-500">
                            <span class="text-sm font-black text-slate-600">習得済みにする</span>
                        </label>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="showAnswer()" class="bg-slate-900 text-white p-6 rounded-3xl font-black shadow-lg text-lg">答え</button>
                    <button onclick="nextQ()" class="bg-red-600 text-white p-6 rounded-3xl font-black shadow-lg text-lg">次へ</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('my_cn_db')) || [];
        let lastPage = localStorage.getItem('my_last_page') || "";
        const toneMap = { 
            a:['ā','á','ǎ','à'], e:['ē','é','ě','è'], i:['ī','í','ǐ','ì'], o:['ō','ó','ǒ','ò'], u:['ū','ú','ǔ','ù'], v:['ǖ','ǘ','ǚ','ǜ'], ü:['ǖ','ǘ','ǚ','ǜ'],
            A:['Ā','Á','Ǎ','À'], E:['Ē','É','Ě','È'], I:['Ī','Í','Ǐ','Ì'], O:['Ō','Ó','Ǒ','Ò'], U:['Ū','Ú','Ǔ','Ù'], V:['Ǖ','Ǘ','Ǚ','Ǜ'], Ü:['Ǖ','Ǘ','Ǚ','Ǜ']
        };
        let editIdx = -1;
        let quizPool = []; let curIdx = 0; let curWordRef = null;
        let clearConfirmActive = false; // 全削除確認フラグ

        window.onload = () => { if(lastPage) document.getElementById('pgIn').value = lastPage; updateCountBadge(); };

        function speak(text) {
            if (!text) return;
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'zh-CN';
            uttr.rate = 0.8;
            speechSynthesis.cancel();
            speechSynthesis.speak(uttr);
        }

        function convertPinyin(str) {
            if (!str) return "";
            let text = str.replace(/v/g, 'ü').replace(/V/g, 'Ü');
            return text.replace(/([aeiouüAEIOUÜ]+)(n?g?r?)([1-4])/g, (match, vowels, consonants, toneNum) => {
                const idx = parseInt(toneNum) - 1;
                let vToReplace = "";
                const vLow = vowels.toLowerCase();
                if (vLow.includes('a')) vToReplace = vowels[vLow.indexOf('a')];
                else if (vLow.includes('e')) vToReplace = vowels[vLow.indexOf('e')];
                else if (vLow.includes('o')) vToReplace = vowels[vLow.indexOf('o')];
                else if (vLow === 'ui') vToReplace = vowels[1];
                else if (vLow === 'iu') vToReplace = vowels[1];
                else vToReplace = vowels[vowels.length - 1];
                return vowels.replace(vToReplace, toneMap[vToReplace][idx]) + consonants;
            });
        }

        async function autoFillAll() {
            const pInput = document.getElementById('pIn');
            const raw = pInput.value.trim();
            if (!raw) return;
            pInput.value = convertPinyin(raw);
            try {
                const purePinyin = raw.toLowerCase().replace(/[1-4\s]/g, '').replace(/v/g, 'u');
                const resKanji = await fetch(`https://inputtools.google.com/request?text=${purePinyin}&itc=zh-t-i0-pinyin&num=1`);
                const dataKanji = await resKanji.json();
                if (dataKanji[0] === "SUCCESS" && dataKanji[1][0][1][0]) {
                    const guessedKanji = dataKanji[1][0][1][0];
                    document.getElementById('wIn').value = guessedKanji;
                    const resTrans = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(guessedKanji)}&langpair=zh-CN|ja-JP`);
                    const dataTrans = await resTrans.json();
                    if(dataTrans && dataTrans.responseData) {
                        document.getElementById('mIn').value = dataTrans.responseData.translatedText;
                    }
                    speak(guessedKanji);
                }
            } catch (e) { console.error(e); }
        }

        function sw(s) {
            ['add', 'list', 'quiz'].forEach(id => {
                document.getElementById('s-' + id).classList.add('h-s');
                document.getElementById('btn-' + id).classList.remove('tab-active');
            });
            document.getElementById('s-' + s).classList.remove('h-s');
            document.getElementById('btn-' + s).classList.add('tab-active');
            if (s === 'list') renderList();
            if (s === 'quiz') setupQuizConfig();
        }

        function add() {
            const word = document.getElementById('wIn').value.trim();
            const pinyin = document.getElementById('pIn').value.trim();
            const mean = document.getElementById('mIn').value.trim();
            const detail = document.getElementById('dIn').value.trim();
            const page = document.getElementById('pgIn').value.trim();
            if (!word || !pinyin) return alert('入力不足です');
            if (editIdx > -1) { db[editIdx] = { ...db[editIdx], word, pinyin, mean, detail, page }; }
            else { db.push({ word, pinyin, mean, detail, page, learned: false }); }
            lastPage = page;
            localStorage.setItem('my_last_page', lastPage);
            save(); resetForm(); sw('list');
        }

        function startEdit(i) {
            editIdx = i;
            const item = db[i];
            document.getElementById('wIn').value = item.word;
            document.getElementById('pIn').value = item.pinyin;
            document.getElementById('mIn').value = item.mean;
            document.getElementById('dIn').value = item.detail || '';
            document.getElementById('pgIn').value = item.page || '';
            document.getElementById('save-btn').innerText = "上書き保存";
            document.getElementById('cancel-btn').classList.remove('hidden');
            document.getElementById('edit-banner').classList.remove('hidden');
            sw('add');
        }

        function resetForm() {
            editIdx = -1;
            ['wIn','pIn','mIn','dIn'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('pgIn').value = lastPage;
            document.getElementById('save-btn').innerText = "登録する";
            document.getElementById('cancel-btn').classList.add('hidden');
            document.getElementById('edit-banner').classList.add('hidden');
        }

        function renderList() {
            updateCountBadge();
            const container = document.getElementById('word-list-container');
            container.innerHTML = db.length ? db.slice().reverse().map((item, i) => {
                const realIdx = db.length - 1 - i;
                return `
                <div class="bg-white p-6 rounded-[2rem] shadow-md border border-slate-200 flex justify-between items-start ${item.learned ? 'opacity-60 bg-slate-50' : ''}">
                    <div class="flex-1 cursor-pointer" onclick="speak('${item.word}')">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" ${item.learned ? 'checked' : ''} onchange="event.stopPropagation(); toggleLearned(${realIdx})" class="w-6 h-6 accent-green-600">
                            <span class="font-black text-3xl text-slate-800">${item.word}</span>
                            <span class="text-xl">🔊</span>
                            ${item.page ? `<span class="bg-slate-100 text-slate-500 text-[10px] px-2 py-0.5 rounded font-black ml-1">P.${item.page}</span>` : ''}
                        </div>
                        <div class="text-md font-black text-red-600 font-mono ml-9 mt-1">${item.pinyin}</div>
                        <div class="text-lg font-bold text-slate-600 ml-9">${item.mean}</div>
                        ${item.detail ? `<div class="text-xs text-slate-400 border-t pt-2 mt-3 ml-9">${item.detail.replace(/\n/g, '<br>')}</div>` : ''}
                    </div>
                    <div class="flex flex-col gap-3">
                        <button onclick="startEdit(${realIdx})" class="bg-slate-100 text-slate-800 font-black text-[10px] px-3 py-2 rounded-lg">編集</button>
                        <button onclick="del(${realIdx})" class="text-slate-300 font-black text-[10px]">削除</button>
                    </div>
                </div>`;
            }).join('') : '<div class="text-center py-20 text-slate-400 font-black italic">データがありません</div>';
        }

        function toggleLearned(i) { db[i].learned = !db[i].learned; save(); renderList(); }
        
        function del(i) { 
            // 削除確認の簡易代替（confirmブロック対策として残す場合はそのまま）
            if (confirm('削除しますか？')) { db.splice(i, 1); save(); renderList(); } 
        }
        
        function save() { localStorage.setItem('my_cn_db', JSON.stringify(db)); }
        
        function updateCountBadge() { document.getElementById('data-count-badge').innerText = `${db.length} words`; }

        function exportData() {
            if (db.length === 0) return alert('データがありません');
            const jsonStr = JSON.stringify(db);
            const area = document.getElementById('shareData');
            area.value = jsonStr;
            area.focus();
            area.setSelectionRange(0, area.value.length);
            alert('全データをテキスト形式（JSON）で作成しました。\n全選択されているので、そのままコピーして送信してください。');
        }

        function importData() {
            const input = document.getElementById('shareData').value.trim();
            if (!input) return alert('データを貼り付けてください');
            if (!confirm('既存のリストに新しい単語を追加しますか？\n（重複は自動でスキップされます）')) return;
            try {
                let decoded;
                if (input.startsWith('[')) {
                    decoded = input;
                } else {
                    decoded = decodeURIComponent(escape(atob(input)));
                }
                const newItems = JSON.parse(decoded);
                if (Array.isArray(newItems)) {
                    let addedCount = 0;
                    newItems.forEach(newItem => {
                        const isDuplicate = db.some(oldItem => 
                            oldItem.word === newItem.word && oldItem.pinyin === newItem.pinyin
                        );
                        if (!isDuplicate) {
                            db.push(newItem);
                            addedCount++;
                        }
                    });
                    save(); renderList();
                    alert(`${addedCount} 件を追加しました！\n（重複 ${newItems.length - addedCount} 件をスキップ）`);
                    document.getElementById('shareData').value = "";
                }
            } catch (e) {
                alert('エラー：データの形式が正しくありません。');
            }
        }

        // 修正箇所：スマホ対応2段階全削除ボタン
        function confirmClearAll() {
            const btn = document.getElementById('clear-all-btn');
            if (!clearConfirmActive) {
                clearConfirmActive = true;
                btn.innerText = "🚨 本当にすべて削除しますか？（もう一度押す）";
                btn.classList.replace('bg-rose-600', 'bg-amber-600');
                
                // 5秒経過で自動リセット
                setTimeout(() => { resetClearButton(); }, 5000);
            } else {
                executeClearAll();
            }
        }

        function executeClearAll() {
            db = [];
            save();
            renderList();
            resetClearButton();
            sw('list');
            alert('すべてのデータを削除しました。');
        }

        function resetClearButton() {
            clearConfirmActive = false;
            const btn = document.getElementById('clear-all-btn');
            if (btn) {
                btn.innerText = "登録単語全削除";
                btn.className = "w-full bg-rose-600 hover:bg-rose-700 p-3 rounded-xl font-black text-sm transition-all mt-2";
            }
        }

        function setupQuizConfig() {
            const pageFilter = document.getElementById('q-page-filter').value;
            let targetWords = db.filter(item => !item.learned);
            if (pageFilter) targetWords = targetWords.filter(item => item.page === pageFilter);
            document.getElementById('unlearned-count').innerText = 
                (pageFilter ? `P.${pageFilter} 範囲: ` : "全範囲: ") + `未修得 ${targetWords.length} 語`;
        }

        function startQuiz(count) {
            const pageFilter = document.getElementById('q-page-filter').value;
            let unlearned = db.filter(item => !item.learned);
            if (pageFilter) unlearned = unlearned.filter(item => item.page === pageFilter);
            if (unlearned.length === 0) return alert('単語がありません');
            
            // countがInfinityの場合でも正しくスライスされる
            quizPool = unlearned.sort(() => 0.5 - Math.random()).slice(0, count);
            curIdx = 0; 
            document.getElementById('q-config').classList.add('h-s'); 
            document.getElementById('q-main').classList.remove('h-s'); 
            nextQ();
        }

        function nextQ() {
            if (curIdx >= quizPool.length) { alert('終了！'); return exitQuiz(); }
            curWordRef = quizPool[curIdx];
            document.getElementById('q-progress').innerText = `${curIdx + 1} / ${quizPool.length}`;
            document.getElementById('q-q').innerText = curWordRef.word;
            document.getElementById('q-p').innerText = curWordRef.pinyin;
            document.getElementById('q-m').innerText = curWordRef.mean;
            document.getElementById('q-learned-toggle').checked = curWordRef.learned;
            document.getElementById('q-a').classList.add('hidden');
            curIdx++;
        }
        
        function showAnswer() { 
            document.getElementById('q-a').classList.remove('hidden'); 
            speak(curWordRef.word);
        }
        
        function updateLearnedInQuiz() { if (curWordRef) { curWordRef.learned = document.getElementById('q-learned-toggle').checked; save(); } }
        
        function exitQuiz() { 
            document.getElementById('q-main').classList.add('h-s');
            document.getElementById('q-config').classList.remove('h-s');
            setupQuizConfig();
        }
        sw('add');
    </script>
</body>
</html>
